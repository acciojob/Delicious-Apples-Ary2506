<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fresh apple varieties at our grocery store — Green, Yellow, Orange, and Red apples with nutritional benefits.">
    <title>Delicious Apples — Grocery Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="product">

        <!-- ================================
             PRODUCT PHOTO  (.product__photo)
        ================================= -->
        <div class="product__photo">

            <!-- Photo Container (.photo-container) -->
            <div class="photo-container">

                <!-- Share & Heart icons -->
                <div class="controls">
                    <span class="icon-share" title="Share">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="18" cy="5"  r="3"/>
                            <circle cx="6"  cy="12" r="3"/>
                            <circle cx="18" cy="19" r="3"/>
                            <line x1="8.59"  y1="13.51" x2="15.42" y2="17.49"/>
                            <line x1="15.41" y1="6.51"  x2="8.59"  y2="10.49"/>
                        </svg>
                    </span>
                    <span class="icon-heart" id="heartIcon" title="Wishlist" onclick="toggleHeart(this)">
                        <svg id="heartSvg" xmlns="http://www.w3.org/2000/svg" width="17" height="17"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67
                                     l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78
                                     l1.06 1.06L12 21.23l7.78-7.78
                                     1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                    </span>
                </div>

                <!-- Main Photo (.photo-main > img) -->
                <div class="photo-main">
                    <img id="mainImage"
                         src="https://res.cloudinary.com/john-mantas/image/upload/v1537302064/codepen/delicious-apples/green-apple2.png"
                         alt="Apple Main View">
                </div>

                <!-- Photo Album (.photo-album > ul > li > img) -->
                <div class="photo-album">
                    <ul>
                        <li class="active" onclick="selectThumb(this)">
                            <img src="https://res.cloudinary.com/john-mantas/image/upload/v1537302064/codepen/delicious-apples/green-apple2.png"
                                 alt="Green Apple">
                        </li>
                        <li onclick="selectThumb(this)">
                            <img src="https://res.cloudinary.com/john-mantas/image/upload/v1537302285/codepen/delicious-apples/red-apple.png"
                                 alt="Red Apple">
                        </li>
                        <li onclick="selectThumb(this)">
                            <img src="https://res.cloudinary.com/john-mantas/image/upload/v1537302752/codepen/delicious-apples/yellow-apple.png"
                                 alt="Yellow Apple">
                        </li>
                        <li onclick="selectThumb(this)">
                            <img src="https://res.cloudinary.com/john-mantas/image/upload/v1537302427/codepen/delicious-apples/orange-apple.png"
                                 alt="Orange Apple">
                        </li>
                    </ul>
                </div>

            </div><!-- /.photo-container -->
        </div><!-- /.product__photo -->

        <!-- ================================
             PRODUCT INFO
        ================================= -->
        <div class="product__info">

            <h1>Delicious Apples</h1>
            <p class="code">CODE: 45999</p>

            <!-- Price (.price) -->
            <div class="price">
                R$<span>7.93</span>
            </div>

            <!-- Varieties (.variant) -->
            <div class="variant">
                <h3>Select a Color</h3>
                <ul>
                    <!-- Green -->
                    <li class="active"
                        data-bg="#a9e033"
                        data-src="https://res.cloudinary.com/john-mantas/image/upload/v1537302064/codepen/delicious-apples/green-apple2.png"
                        onclick="selectVariant(this)" title="Green Apple">
                        <img src="https://res.cloudinary.com/john-mantas/image/upload/v1537302064/codepen/delicious-apples/green-apple2.png"
                             alt="Green Apple">
                    </li>
                    <!-- Yellow -->
                    <li data-bg="#f0d84a"
                        data-src="https://res.cloudinary.com/john-mantas/image/upload/v1537302752/codepen/delicious-apples/yellow-apple.png"
                        onclick="selectVariant(this)" title="Yellow Apple">
                        <img src="https://res.cloudinary.com/john-mantas/image/upload/v1537302752/codepen/delicious-apples/yellow-apple.png"
                             alt="Yellow Apple">
                    </li>
                    <!-- Orange -->
                    <li data-bg="#f5a623"
                        data-src="https://res.cloudinary.com/john-mantas/image/upload/v1537302427/codepen/delicious-apples/orange-apple.png"
                        onclick="selectVariant(this)" title="Orange Apple">
                        <img src="https://res.cloudinary.com/john-mantas/image/upload/v1537302427/codepen/delicious-apples/orange-apple.png"
                             alt="Orange Apple">
                    </li>
                    <!-- Red -->
                    <li data-bg="#e63946"
                        data-src="https://res.cloudinary.com/john-mantas/image/upload/v1537302285/codepen/delicious-apples/red-apple.png"
                        onclick="selectVariant(this)" title="Red Apple">
                        <img src="https://res.cloudinary.com/john-mantas/image/upload/v1537302285/codepen/delicious-apples/red-apple.png"
                             alt="Red Apple">
                    </li>
                </ul>
            </div>

            <!-- Benefits (.description) -->
            <div class="description">
                <h3>Benefits</h3>
                <ul>
                    <li>Apples are nutritious</li>
                    <li>Apples may be good for weight loss</li>
                    <li>Apples may be good for bone health</li>
                    <li>They're linked to a lower risk of diabetes</li>
                </ul>
            </div>

            <!-- ADD TO CART (display only) -->
            <button class="buy--btn">ADD TO CART</button>

        </div><!-- /.product__info -->

    </div><!-- /.product -->

    <script>
        /* ── Select color variant → swap main image + bg + all album thumbs ── */
        function selectVariant(li) {
            document.querySelectorAll('.variant li').forEach(el => el.classList.remove('active'));
            li.classList.add('active');

            const src = li.dataset.src;
            const bg  = li.dataset.bg;

            // Update main image
            document.getElementById('mainImage').src = src;

            // Update background colour
            document.querySelector('.photo-main').style.backgroundColor = bg;

            // Update ALL album thumbnails to the selected apple
            document.querySelectorAll('.photo-album li').forEach((albumLi, i) => {
                albumLi.querySelector('img').src = src;
                // Keep first thumbnail as "active" after switching
                albumLi.classList.toggle('active', i === 0);
            });
        }

        /* ── Select thumbnail → swap main image ── */
        function selectThumb(li) {
            document.querySelectorAll('.photo-album li').forEach(el => el.classList.remove('active'));
            li.classList.add('active');
            document.getElementById('mainImage').src = li.querySelector('img').src;
        }

        /* ── Toggle wishlist heart ── */
        function toggleHeart(el) {
            el.classList.toggle('loved');
        }
    </script>

</body>
</html>
